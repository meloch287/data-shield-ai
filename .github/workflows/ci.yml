name: CI

on:
  push:
    branches: [main, test-optimization-test]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (stdlib only, no dependencies)
        run: python -m unittest discover -s tests -t . -v
      - name: Smoke test CLI
        run: echo "email a@b.com, ИНН 7707083893" | python -m datashield redact
