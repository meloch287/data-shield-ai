name: CI

on:
  push:
    branches: [main, test-optimization-test]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (stdlib only, no dependencies)
        run: python -m unittest discover -s tests -t . -v
      - name: Smoke test CLI
        run: echo "email a@b.com, ИНН 7707083893" | python -m datashield redact

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - name: Ruff
        run: ruff check datashield tests
      - name: Mypy
        run: mypy datashield

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install coverage
      - name: Coverage
        run: |
          coverage run -m unittest discover -s tests -t .
          coverage report -m

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate metadata
        run: twine check dist/*
      - name: Install into a clean venv and smoke-test
        run: |
          python -m venv /tmp/v
          /tmp/v/bin/pip install dist/*.whl
          echo 'email a@b.com, ИНН 7707083893' | /tmp/v/bin/datashield redact
          /tmp/v/bin/datashield --version
          /tmp/v/bin/python -c "import datashield.integrations.mcp_server, datashield.data.names; from datashield import redact, redact_json"
