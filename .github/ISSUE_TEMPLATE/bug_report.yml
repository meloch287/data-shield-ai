name: Bug report
description: A redaction bypass, false positive, crash, or other defect
labels: ["bug"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - Redaction bypass (real PII/secret survived)
        - False positive (ordinary text masked)
        - Crash / traceback
        - Performance / hang
        - Other
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Input
      description: Minimal text (REDACT any real secret before posting).
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual output
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Python
      placeholder: "datashield 1.1.0, Python 3.12"
    validations:
      required: true
